<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Park Patrol Offline</title>
    <style>
      body {
        margin: 0;
        background: #f8fafc;
        color: #020617;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        box-sizing: border-box;
        margin: 0 auto;
        max-width: 28rem;
        min-height: 100vh;
        padding: 3rem 1rem;
      }

      section {
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        background: #ffffff;
        padding: 1rem;
        box-shadow: 0 1px 3px rgb(15 23 42 / 0.12);
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
      }

      p {
        color: #475569;
        line-height: 1.5;
      }

      a {
        color: #020617;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Park Patrol is offline</h1>
        <p>
          Reopen the dashboard once this device has loaded the app at least once.
          Your saved patrol data stays on this device.
        </p>
        <a href="/">Try the dashboard</a>
      </section>
    </main>
  </body>
</html>
